<!doctype html>
<html lang="de">
  <head>
    <link rel="stylesheet" type="text/css" href="css/stylesheet_main.css">
    <link rel="icon" type="image/x-icon" href="">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nürburgring Nordschleife</title>
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  </head>
  
   <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
   <script src="js/leaflet-ajax-2.1.0/dist/leaflet.ajax.min.js"></script>
  <body>   
    <header>
      <nav>
        <div class="nav-logo">
          <a href="index.html#start">Nordschleife</a>
        </div>
        <div class="nav-links">
          <a href="index.html#fakten">Fakten</a>
          <a href="index.html#rekorde">Rekorde</a>
          <a href="index.html#livedaten">Live Streckendaten</a>
		  <a href="index.html#anreise">Anreise</a>
		  <a href="strecke.html">Streckenplan</a>
        </div>
      </nav>
    </header>
    <main>
		<div class="divider"></div>
		
		<section id="strecke">
			<div id="intkarte"></div>
			
			<script>
				var map = L.map('intkarte').setView([50.365558, 6.918898], 13);
				

				
			
				L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
					maxZoom: 19,
					attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
				}).addTo(map);

				fetch("data/streckenabschnitte_nordschleife.geojson")
  					.then(response => response.json())
  					.then(data => {
   						district_boundary.addData(data);
  					})
  					.catch(error => console.error(error));

				var district_boundary = new L.geoJSON(null, {
    				onEachFeature: function(feature, layer) {
        				if (feature.properties && feature.properties.name) {
            				layer.bindPopup(feature.properties.name);
        					}
    					}
				}).addTo(map);
			</script>
			
		</section>
    </main>
    <footer>
      <div class="footer-logo">Nordschleife</div>
      <a href="https://maps.app.goo.gl/nBLVvrPZBHRWg4JL8" target="_blank">Nürburgring - Eifel, Rheinland-Pfalz, Deutschland</a>
      <p>Eine Hommage an die <em><strong>Grüne Hölle</strong></em></p>
    </footer>
  </body>
</html>
